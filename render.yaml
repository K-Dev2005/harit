services:
  - type: web
    name: harit-backend
    env: node
    region: singapore   # closest to India
    plan: free
    buildCommand: npm install --include=dev && npm run build:server
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_URL
        sync: false   # set to your Render service URL e.g. https://harit-backend.onrender.com
      - key: FRONTEND_URL
        sync: false   # set to your Vercel URL e.g. https://harit.vercel.app
